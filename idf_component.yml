version: "1.0.0"
description: "ESP-IDF driver for the VL53L0X ToF sensor featuring configurable ranging profiles, continuous measurements, and GPIO interrupt support."
url: "https://github.com/pkolt/vl53l0x-esp-idf"
repository: "https://github.com/pkolt/vl53l0x-esp-idf.git"
documentation: "https://github.com/pkolt/vl53l0x-esp-idf"
issues: "https://github.com/pkolt/vl53l0x-esp-idf/issues"
examples:
  - path: ./examples/continuous_ranging
  - path: ./examples/continuous_timed
  - path: ./examples/manual_polling
  - path: ./examples/single_ranging
  - path: ./examples/single_ranging_interrupt
  - path: ./examples/threshold_interrupt
dependencies:
  idf: ">=6.0"
license: "MIT"
